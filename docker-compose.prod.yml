services:
  mongodb:
    image: mongo:7
    container_name: pict-cie-mongo
    profiles: ['localdb']
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: pict_cie
    volumes:
      - mongo_data:/data/db
    networks:
      - cie-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pict-cie-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    networks:
      - cie-network
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:5000/api/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pict-cie-frontend
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-80}:80'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cie-network
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost/healthz || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mongo_data:
  backend_logs:

networks:
  cie-network:
    driver: bridge
